<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a08" />
    <meta name="description" content="Run & Bee by Dr. Rajat Chauhan" />
    <link rel="icon" type="image/svg+xml" href="/la-ultra-icon.svg" />
    <link rel="apple-touch-icon" href="/la-ultra-icon.svg" />
    <title>La Ultra</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <script>
      (function () {
        var t = localStorage.getItem('gb_theme') || 'laultra'
        document.documentElement.dataset.theme = t
        // Match the mobile status/address bar to the active theme on first paint
        // (React keeps it in sync afterwards). Values mirror each theme's --cream.
        var BG = { light: '#f7f5ef', dark: '#10130f', ember: '#160d0d', ocean: '#071419', forest: '#080f07', violet: '#0e0a18', rose: '#180a0e', midnight: '#070a14', laultra: '#0a0a08' }
        var m = document.querySelector('meta[name="theme-color"]')
        if (m) m.setAttribute('content', BG[t] || BG.laultra)
      })()
    </script>
    <div id="root"></div>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
